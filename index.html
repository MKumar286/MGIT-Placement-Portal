<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Placement Portal - Login</title>
    <style>
        /* Base Setup and CSS Variables */
        :root {
            --bg-gradient: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* Theme Colors */
            --student-blue: #0284c7;
            --student-hover: #0369a1;
            --tpo-green: #2d6a4f;
            --tpo-hover: #1b4332;
            --guest-orange: #d97706;
            --guest-hover: #b45309;

            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Header Branding */
        .header-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        /* SVG University Crest Badge Placeholder */
        .crest-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            fill: #1e3a8a;
        }

        .header-logo h1 {
            color: #0f172a;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Login Grid Layout - Adapts fluidly */
        .login-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* Card Structure */
        .login-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        /* Card Headers with Colored Backgrounds */
        .card-header {
            padding: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-header.student { background-color: var(--student-blue); }
        .card-header.tpo { background-color: var(--tpo-green); }
        .card-header.guest { background-color: var(--guest-orange); }

        .header-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Card Body Forms */
        .card-body {
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .welcome-msg {
            text-align: center;
            color: var(--text-dark);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        /* Input Fields Styling with Left Padding for Inline Icons */
        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none; /* Fix for iOS input rendering */
        }

        .form-group input:focus {
            border-color: #64748b;
        }

        /* CSS Inline SVGs for Fields */
        .form-group::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.5;
        }

        .icon-email::before { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" /></svg>'); }
        .icon-password::before { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>'); }
        .icon-id::before { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0" /></svg>'); }
        .icon-user::before { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>'); }

        /* Actions Buttons */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }

        .student-btn { background-color: var(--student-blue); }
        .student-btn:hover { background-color: var(--student-hover); }
        
        .tpo-btn { background-color: var(--tpo-green); }
        .tpo-btn:hover { background-color: var(--tpo-hover); }

        .guest-btn { background-color: var(--guest-orange); }
        .guest-btn:hover { background-color: var(--guest-hover); }

        /* Bottom Alternate Links */
        .card-links {
            margin-top: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
            padding: 5px 0; /* Easier to tap on mobile */
        }

        .card-links a:hover {
            color: #000000;
            text-decoration: underline;
        }

        /* --- MOBILE RESPONSIVE QUERIES --- */
        
        /* Tablets & Smaller Desktops */
        @media (max-width: 1024px) {
            .login-container {
                grid-template-columns: repeat(2, 1fr); /* Drop to 2 columns */
                gap: 20px;
            }
        }

        /* Mobile Devices (Smartphones) */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .header-logo {
                margin-bottom: 25px;
            }

            .header-logo h1 {
                font-size: 22px;
            }

            .login-container {
                grid-template-columns: 1fr; /* Single column stack */
                max-width: 420px; /* Centered compact layout */
                gap: 25px;
            }

            .card-body {
                padding: 25px 20px; /* Slightly tighter padding for mobile screens */
            }

            .welcome-msg {
                font-size: 15px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- University Core Top Branding Header -->
    <div class="header-logo">
        <svg class="crest-icon" viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>City Global University</h1>
    </div>

    <!-- Login Options Workspace Grid wrapper -->
    <div class="login-container">

        <!-- 1. STUDENT LOGIN COMPONENT -->
        <div class="login-card">
            <div class="card-header student">
                <div class="header-avatar">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                </div>
                <h2>Student Login</h2>
            </div>
            <div class="card-body">
                <div class="welcome-msg">Welcome back, Student!</div>
                <form action="#" method="POST">
                    <div class="form-group icon-email">
                        <input type="email" placeholder="University Email Address" required autocomplete="email">
                    </div>
                    <div class="form-group icon-password">
                        <input type="password" placeholder="Password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="submit-btn student-btn">Sign In</button>
                </form>
                <div class="card-links">
                    <a href="#forgot">Forgot Password?</a>
                    <a href="#register">New Student Registration</a>
                </div>
            </div>
        </div>

        <!-- 2. TPO / ADMIN LOGIN COMPONENT -->
        <div class="login-card">
            <div class="card-header tpo">
                <div class="header-avatar">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm6.5 6c0-2.3-3.03-3.5-6-3.5s-6 1.2-6 3.5V20h12v-2z"/></svg>
                </div>
                <h2>TPO Login</h2>
            </div>
            <div class="card-body">
                <div class="welcome-msg">TPO and Admin Access</div>
                <form action="academic.html" method="GET">
                    <div class="form-group icon-id">
                        <input type="text" placeholder="Official Staff ID" required>
                    </div>
                    <div class="form-group icon-password">
                        <input type="password" placeholder="Secure Password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="submit-btn tpo-btn">Secure Login</button>
                </form>
                <div class="card-links">
                    <a href="#forgot-staff">Forgot Staff Password?</a>
                    <a href="#request-access">Access Request</a>
                </div>
            </div>
        </div>

        <!-- 3. GUEST LOGIN COMPONENT -->
        <div class="login-card">
            <div class="card-header guest">
                <div class="header-avatar">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M16.5 6a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18 16.5a5.5 5.5 0 00-11 0V18h11v-1.5z"/></svg>
                </div>
                <h2>Guest Login</h2>
            </div>
            <div class="card-body">
                <div class="welcome-msg">Welcome, Visitor!</div>
                <form action="#" method="POST">
                    <div class="form-group icon-user">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="form-group icon-email">
                        <input type="email" placeholder="Authorized Guest Email" required>
                    </div>
                    <button type="submit" class="submit-btn guest-btn">Submit & Enter</button>
                </form>
                <div class="card-links">
                    <a href="#about-guest">What is a Guest Account?</a>
                    <a href="#create-guest">Create Guest Access</a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
